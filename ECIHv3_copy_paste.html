<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECIH v3 模擬題庫 (智慧螢光筆解析版)</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --success: #2ecc71;
            --danger: #e74c3c;
            --light: #f4f7f6;
            --border: #e0e6ed;
            --text-dark: #333;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light);
            color: var(--text-dark);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 850px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            transition: all 0.3s;
        }

        header {
            border-bottom: 2px solid var(--border);
            margin-bottom: 20px;
            padding-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        h2 { margin: 0; color: var(--primary); font-size: 1.6em; }

        .stats-board { display: flex; gap: 15px; }

        .stat-box {
            background: var(--light);
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid var(--border);
            text-align: center;
            font-weight: bold;
        }

        .stat-box span {
            display: block;
            font-size: 1.2em;
            color: var(--primary);
            margin-top: 5px;
        }

        /* Setup Screen */
        #setup-screen { text-align: center; }
        .instruction {
            background: #eafaf1;
            color: #27ae60;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: left;
            font-weight: bold;
            border-left: 5px solid var(--success);
        }
        
        #rich-input {
            width: 100%;
            height: 400px;
            border: 3px dashed var(--secondary);
            border-radius: 10px;
            padding: 20px;
            overflow-y: auto;
            text-align: left;
            background: #fafcfd;
            font-size: 1.1em;
            margin-bottom: 20px;
            outline: none;
        }

        #rich-input:empty:before {
            content: "請在這裡 Ctrl+V 貼上您的 Word 內容...";
            color: #aaa;
        }

        #rich-input:focus { border-color: var(--primary); background: #fff; }

        .btn-parse {
            background: var(--primary);
            color: white;
            font-size: 1.2em;
            padding: 12px 40px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .btn-parse:hover { background: #1a252f; transform: translateY(-2px); }

        /* Quiz Screen */
        .navigator {
            display: flex;
            align-items: center;
            background: #ebf5fb;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            gap: 10px;
            border: 1px solid #bce0fd;
            flex-wrap: wrap;
        }

        .navigator label { font-weight: bold; color: var(--primary); }
        .navigator input {
            width: 80px; padding: 8px; border: 1px solid #ccc;
            border-radius: 6px; font-size: 1em; text-align: center;
        }
        .navigator button {
            padding: 8px 20px; background: var(--secondary); color: white;
            border: none; border-radius: 6px; cursor: pointer; font-weight: bold;
        }
        .navigator button:hover { background: #2980b9; }

        .question-card { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .source-tag {
            font-size: 0.85em; background: #e1e8ed; padding: 5px 10px;
            border-radius: 20px; margin-bottom: 15px; display: inline-block;
            color: #555; font-weight: 600;
        }
        
        .alert-tag {
            font-size: 0.85em; background: #fff3cd; padding: 5px 10px;
            border-radius: 20px; margin-bottom: 15px; display: inline-block;
            color: #856404; font-weight: 600; margin-left: 10px;
        }

        .question-text {
            font-size: 1.2em; font-weight: 600; margin-bottom: 25px;
            line-height: 1.6; color: var(--primary);
        }

        .options-list { list-style: none; padding: 0; margin: 0; }
        .option-item {
            background: #fdfdfd; border: 2px solid var(--border); padding: 16px;
            margin-bottom: 12px; border-radius: 8px; cursor: pointer;
            transition: all 0.2s; font-size: 1.05em; line-height: 1.4;
        }
        .option-item:hover:not(.disabled) {
            border-color: var(--secondary); background: #f0f8ff; transform: translateX(5px);
        }
        .option-item.disabled { cursor: default; }
        .option-item.correct {
            border-color: var(--success) !important; background: #eafaf1 !important; font-weight: bold;
        }
        .option-item.wrong {
            border-color: var(--danger) !important; background: #fdedec !important;
        }

        .feedback {
            margin-top: 20px; padding: 15px; border-radius: 8px;
            font-size: 1.1em; font-weight: bold; display: none;
        }

        .controls {
            margin-top: 35px; display: flex; justify-content: space-between;
            border-top: 2px solid var(--border); padding-top: 20px;
        }
        .controls button {
            padding: 12px 25px; border: none; border-radius: 6px; cursor: pointer;
            font-weight: bold; font-size: 1.05em; transition: 0.2s;
        }
        .btn-prev { background: #95a5a6; color: white; }
        .btn-prev:hover:not(:disabled) { background: #7f8c8d; }
        .btn-next { background: var(--primary); color: white; }
        .btn-next:hover:not(:disabled) { background: #1a252f; }
        button:disabled { opacity: 0.4; cursor: not-allowed; }

    </style>
</head>
<body>

<!-- 初始畫面：供使用者貼上 Word 內容 -->
<div class="container" id="setup-screen">
    <h2>🛠️ 智慧題庫解析器 (支援螢光筆解答)</h2>
    <div class="instruction">
        👉 步驟 1：請打開您的 Word 檔。<br>
        👉 步驟 2：按下 <b>Ctrl+A</b> (全選) 並按下 <b>Ctrl+C</b> (複製)。<br>
        👉 步驟 3：點擊下方空白框框，按下 <b>Ctrl+V</b> (貼上)，保留螢光筆格式。<br>
        👉 步驟 4：點擊最下方的「開始解析並生成題庫」。
    </div>
    
    <div id="rich-input" contenteditable="true"></div>
    <button class="btn-parse" onclick="parseRichText()">🚀 開始解析並生成題庫</button>
</div>

<!-- 測驗畫面：解析完成後顯示 -->
<div class="container" id="quiz-screen" style="display: none;">
    <header>
        <div>
            <h2>ECIH v3 模擬考練習</h2>
            <p style="margin: 5px 0 0 0; color: #7f8c8d; font-size: 0.9em;">已成功載入包含解答的題庫</p>
        </div>
        <div class="stats-board">
            <div class="stat-box">
                作答進度
                <span id="progress-text">0 / 0</span>
            </div>
            <div class="stat-box">
                答對題數
                <span id="score-text" style="color: var(--success);">0</span>
            </div>
        </div>
    </header>

    <div class="navigator">
        <label for="jump-input">前往題號：</label>
        <input type="number" id="jump-input" min="1" value="1">
        <span style="font-weight: bold; color: #555;">/ 共 <span id="total-q"></span> 題</span>
        <button onclick="jumpQuestion()">立即跳轉</button>
    </div>

    <div id="quiz-container">
        <!-- 題目將由 JavaScript 動態生成 -->
    </div>

    <div class="controls">
        <button class="btn-prev" id="prev-btn" onclick="prevQuestion()">◄ 上一題</button>
        <button class="btn-next" id="next-btn" onclick="nextQuestion()">下一題 ►</button>
    </div>
</div>

<script>
    let rawData = [];
    let currentIdx = 0; 
    let userState = [];

    // 解析貼上的 Rich Text (包含螢光筆顏色)
    function parseRichText() {
        const editor = document.getElementById('rich-input');
        
        // 抓出所有段落元素 (Word 貼上通常會包成 p 或 div)
        let elementsToProcess = editor.querySelectorAll('p, div, li');
        
        // 過濾出「最底層」的區塊，避免重複計算父層
        let leafBlocks = Array.from(elementsToProcess).filter(el => {
            return !el.querySelector('p, div, li');
        });

        // 如果完全沒有段落格式(純文字貼上)，做防呆處理
        if (leafBlocks.length === 0) {
            let lines = editor.innerText.split('\n');
            leafBlocks = lines.map(t => {
                let el = document.createElement('div');
                el.textContent = t;
                return el;
            });
        }

        let questions = [];
        let currentQ = null;
        let blockName = "Part 205";

        leafBlocks.forEach(line => {
            let text = line.innerText || line.textContent || "";
            text = text.trim();
            if (!text) return; // 跳過空行

            // 判斷此行是否包含「背景顏色」(螢光筆)
            let isHighlighted = false;
            // 檢查該行本身與其所有子元素
            let nodesToCheck = [line, ...line.querySelectorAll('*')];
            for (let n of nodesToCheck) {
                if (n.style && (n.style.backgroundColor || n.style.background)) {
                    let bg = (n.style.backgroundColor || n.style.background).toLowerCase();
                    // 排除透明背景
                    if (bg !== 'transparent' && bg !== 'rgba(0, 0, 0, 0)' && bg !== 'inherit' && bg !== '') {
                        isHighlighted = true;
                        break;
                    }
                }
                // 檢查 HTML5 的 mark 標籤
                if (n.tagName && n.tagName.toLowerCase() === 'mark') {
                    isHighlighted = true;
                    break;
                }
            }

            // 偵測大題塊切換
            if (text.includes("Exam A Part.Question 100")) {
                blockName = "Part 100";
                return;
            }

            // 偵測新題目 (匹配 QUESTION 1 或 1. 甚至是 12 漏打點的狀況)
            if (text.match(/^QUESTION \d+/i) || text.match(/^\d+\.?\s*$/)) {
                if (currentQ && currentQ.q) questions.push(currentQ);
                currentQ = { 
                    q: "", 
                    options: [], 
                    ans: 0, // 預設答案 0 (A)
                    hasHighlight: false, 
                    src: blockName + " - " + text.replace('.', '').trim() 
                };
                return;
            }

            if (!currentQ) return;

            // 偵測選項 (A. B. C. D.)
            let optMatch = text.match(/^([A-D])\.\s*(.+)/i);
            if (optMatch) {
                currentQ.options.push(optMatch[2].trim());
                // 如果這個選項被畫了螢光筆，設為正確答案！
                if (isHighlighted) {
                    currentQ.ans = currentQ.options.length - 1;
                    currentQ.hasHighlight = true;
                }
            } else {
                // 若非選項，判定為題目內文或選項的第二行
                if (currentQ.options.length === 0) {
                    currentQ.q += (currentQ.q ? "<br>" : "") + text;
                } else {
                    currentQ.options[currentQ.options.length - 1] += " " + text;
                    if (isHighlighted) {
                        currentQ.ans = currentQ.options.length - 1;
                        currentQ.hasHighlight = true;
                    }
                }
            }
        });

        // 推入最後一題
        if (currentQ && currentQ.q) {
            questions.push(currentQ);
        }

        if (questions.length < 10) {
            alert("⚠️ 錯誤：解析到的題數異常過少，請確認您是否有複製並貼上完整的 Word 內容。");
            return;
        }

        // 解析成功，啟動測驗
        rawData = questions;
        userState = new Array(rawData.length).fill(null);
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        
        initQuiz();
    }

    function initQuiz() {
        const total = rawData.length;
        document.getElementById('total-q').textContent = total;
        document.getElementById('progress-text').textContent = `0 / ${total}`;
        document.getElementById('jump-input').max = total;
        
        renderQuestion();
        alert(`🎉 解析成功！共匯入 ${total} 題。螢光筆標記已自動轉換為正確解答。`);
    }

    function renderQuestion() {
        const container = document.getElementById('quiz-container');
        const currentQ = rawData[currentIdx];
        const state = userState[currentIdx];

        document.getElementById('jump-input').value = currentIdx + 1;
        document.getElementById('prev-btn').disabled = (currentIdx === 0);
        document.getElementById('next-btn').disabled = (currentIdx === rawData.length - 1);

        let optionsHtml = '';
        currentQ.options.forEach((opt, i) => {
            let itemClass = 'option-item';
            
            if (state && state.answered) {
                itemClass += ' disabled';
                if (i === currentQ.ans) itemClass += ' correct';
                else if (i === state.selectedIdx && !state.isCorrect) itemClass += ' wrong';
            }

            optionsHtml += `
                <li class="${itemClass}" onclick="checkAnswer(${i})">
                    <strong>${String.fromCharCode(65 + i)}.</strong> ${opt}
                </li>
            `;
        });

        let feedbackHtml = '';
        if (state && state.answered) {
            if (state.isCorrect) {
                feedbackHtml = `<div class="feedback" style="display:block; background:#eafaf1; color:var(--success);">✅ 答對了！</div>`;
            } else {
                feedbackHtml = `<div class="feedback" style="display:block; background:#fdedec; color:var(--danger);">❌ 答錯了。正確答案為: ${String.fromCharCode(65 + currentQ.ans)}</div>`;
            }
        }

        // 若無偵測到螢光筆的提示
        let alertTag = currentQ.hasHighlight ? "" : `<div class="alert-tag">⚠️ 此題未偵測到螢光筆，預設答案為 A</div>`;

        let html = `
            <div class="question-card">
                <div class="source-tag">📂 來源：${currentQ.src}</div>
                ${alertTag}
                <div class="question-text">
                    <span style="color:var(--secondary);">第 ${currentIdx + 1} 題：</span><br><br>
                    ${currentQ.q}
                </div>
                <ul class="options-list">
                    ${optionsHtml}
                </ul>
                ${feedbackHtml}
            </div>
        `;
        
        container.innerHTML = html;
        updateStats();
    }

    function checkAnswer(selectedIdx) {
        if (userState[currentIdx] && userState[currentIdx].answered) return;

        const currentQ = rawData[currentIdx];
        const isCorrect = (selectedIdx === currentQ.ans);

        userState[currentIdx] = {
            answered: true,
            selectedIdx: selectedIdx,
            isCorrect: isCorrect
        };

        renderQuestion();
    }

    function jumpQuestion() {
        const inputVal = parseInt(document.getElementById('jump-input').value);
        if (isNaN(inputVal) || inputVal < 1 || inputVal > rawData.length) {
            alert(`⚠️ 請輸入 1 到 ${rawData.length} 之間的有效題號。`);
            return;
        }
        currentIdx = inputVal - 1;
        renderQuestion();
    }

    function prevQuestion() {
        if (currentIdx > 0) {
            currentIdx--;
            renderQuestion();
        }
    }

    function nextQuestion() {
        if (currentIdx < rawData.length - 1) {
            currentIdx++;
            renderQuestion();
        }
    }

    function updateStats() {
        let answeredCount = 0;
        let correctCount = 0;
        
        userState.forEach(state => {
            if (state && state.answered) {
                answeredCount++;
                if (state.isCorrect) correctCount++;
            }
        });

        document.getElementById('progress-text').textContent = `${answeredCount} / ${rawData.length}`;
        document.getElementById('score-text').textContent = correctCount;
    }
</script>

</body>
</html>
