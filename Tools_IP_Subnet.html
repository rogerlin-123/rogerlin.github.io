<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP / Subnet 計算機</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding: 40px; }
        .container { background: white; padding: 2.5rem; border-radius: 12px; box-shadow: 0 4px 25px rgba(0,0,0,0.1); width: 100%; max-width: 650px; }
        h2 { color: #000000; text-align: center; margin-bottom: 2rem; font-size: 1.8rem; }
        .input-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #333; font-size: 1.1rem; }
        input { width: 100%; padding: 14px; border: 2px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 1.1rem; }
        input:focus { border-color: #3498db; outline: none; }
        button { width: 100%; padding: 15px; background-color: #3498db; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1.2rem; font-weight: bold; margin-top: 10px; transition: background 0.3s; }
        button:hover { background-color: #2980b9; }
        
        .result { margin-top: 25px; display: none; border-top: 3px solid #000; padding-top: 25px; }
        .result-item { display: flex; flex-direction: column; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 12px; }
        .row-main { display: flex; justify-content: space-between; align-items: center; }
        
        .label { color: #000000; font-weight: 600; font-size: 1.1rem; }
        .value { color: #000000; font-family: 'Consolas', 'Monaco', monospace; font-weight: 800; font-size: 1.25rem; }
        
        .extra-values { text-align: right; margin-top: 8px; }
        .binary-value, .hex-value { 
            font-family: 'Consolas', 'Monaco', monospace; 
            font-size: 1rem; 
            margin-top: 4px; 
            letter-spacing: 0.5px; 
            color: #000000; 
            font-weight: 500;
        }
        .hex-value { font-weight: 700; }
    </style>
</head>
<body>

<div class="container">
    <h2>IP Subnet 計算機</h2>
    <div class="input-group">
        <label>輸入 IP / CIDR</label>
        <input type="text" id="cidrInput" placeholder="例如: 192.168.1.1/24" value="192.168.1.1/24">
    </div>
    <button onclick="calculate()">執行計算</button>

    <div class="result" id="resultArea">
        <!-- 網路位址 (原在第二項，現移至首項) -->
        <div class="result-item">
            <div class="row-main">
                <span class="label">網路位址 (Network):</span>
                <span class="value" id="resNet"></span>
            </div>
        </div>

        <!-- 子網路遮罩 (現移至第二項) -->
        <div class="result-item">
            <div class="row-main">
                <span class="label">子網路遮罩 (Mask):</span>
                <span class="value" id="resMask"></span>
            </div>
            <div class="extra-values">
                <div class="binary-value" id="resMaskBin"></div>
                <div class="hex-value" id="resMaskHex"></div>
            </div>
        </div>

        <!-- 網路代表號 -->
        <div class="result-item">
            <div class="row-main">
                <span class="label">網路代表號 (Network ID):</span>
                <span class="value" id="resID"></span>
            </div>
            <div class="extra-values">
                <div class="binary-value" id="resIDBin"></div>
                <div class="hex-value" id="resIDHex"></div>
            </div>
        </div>

        <!-- 廣播位址 -->
        <div class="result-item">
            <div class="row-main">
                <span class="label">廣播位址 (Broadcast):</span>
                <span class="value" id="resBcast"></span>
            </div>
            <div class="extra-values">
                <div class="binary-value" id="resBcastBin"></div>
                <div class="hex-value" id="resBcastHex"></div>
            </div>
        </div>

        <!-- 可用範圍 -->
        <div class="result-item">
            <div class="row-main">
                <span class="label">可用主機範圍:</span>
                <span class="value" id="resRange"></span>
            </div>
        </div>
        
        <!-- 主機總數 -->
        <div class="result-item" style="border-bottom: none;">
            <div class="row-main">
                <span class="label">總主機數:</span>
                <span class="value" id="resCount"></span>
            </div>
        </div>
    </div>
</div>

<script>
    function ipToLong(ip) {
        return ip.split('.').reduce((acc, octet) => (acc << 8) + parseInt(octet, 10), 0) >>> 0;
    }

    function longToIp(long) {
        return [ (long >>> 24) & 0xFF, (long >>> 16) & 0xFF, (long >>> 8) & 0xFF, long & 0xFF ].join('.');
    }

    function longToBinary(long) {
        const bin = (long >>> 0).toString(2).padStart(32, '0');
        const formattedBin = bin.match(/.{8}/g).join('.');
        return "二進制：" + formattedBin;
    }

    function longToHex(long) {
        const hex = (long >>> 0).toString(16).toUpperCase().padStart(8, '0');
        const formattedHex = hex.match(/.{2}/g).join('.');
        return "十六進制：" + formattedHex;
    }

    function calculate() {
        const input = document.getElementById('cidrInput').value.trim();
        const parts = input.split('/');
        
        if (parts.length !== 2) {
            alert("格式錯誤！請輸入正確的 CIDR 格式 (如 10.0.0.1/24)");
            return;
        }

        const ipStr = parts[0];
        const prefix = parseInt(parts[1], 10);

        if (isNaN(prefix) || prefix < 0 || prefix > 32) {
            alert("遮罩長度必須在 0 到 32 之間");
            return;
        }

        const ipLong = ipToLong(ipStr);
        const maskLong = (prefix === 0) ? 0 : (0xFFFFFFFF << (32 - prefix)) >>> 0;
        const netLong = (ipLong & maskLong) >>> 0;
        const bcastLong = (netLong | (~maskLong)) >>> 0;

        const hostCount = prefix <= 30 ? (bcastLong - netLong - 1) : (prefix === 31 ? 2 : 1);
        const firstHost = prefix <= 30 ? longToIp(netLong + 1) : longToIp(netLong);
        const lastHost = prefix <= 30 ? longToIp(bcastLong - 1) : longToIp(bcastLong);

        // 填充結果
        document.getElementById('resMask').innerText = longToIp(maskLong);
        document.getElementById('resNet').innerText = longToIp(netLong) + " /" + prefix;
        document.getElementById('resID').innerText = longToIp(netLong);
        document.getElementById('resBcast').innerText = longToIp(bcastLong);
        document.getElementById('resRange').innerText = `${firstHost} - ${lastHost}`;
        document.getElementById('resCount').innerText = hostCount.toLocaleString();

        document.getElementById('resMaskBin').innerText = longToBinary(maskLong);
        document.getElementById('resIDBin').innerText = longToBinary(netLong);
        document.getElementById('resBcastBin').innerText = longToBinary(bcastLong);

        document.getElementById('resMaskHex').innerText = longToHex(maskLong);
        document.getElementById('resIDHex').innerText = longToHex(netLong);
        document.getElementById('resBcastHex').innerText = longToHex(bcastLong);
        
        document.getElementById('resultArea').style.display = 'block';
    }
</script>

</body>
</html>
