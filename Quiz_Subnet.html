<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP 子網路計算測驗 (十題特訓版)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .quiz-container {
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            padding: 30px;
            width: 100%;
            max-width: 600px;
            position: relative;
            max-height: 90vh;
            overflow-y: auto;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            font-size: 24px;
            margin-bottom: 20px;
        }
        /* 首頁說明樣式 */
        #start-content {
            text-align: center;
        }
        .instruction-list {
            text-align: left;
            background-color: #f8f9fa;
            padding: 20px 20px 20px 40px;
            border-radius: 8px;
            border-left: 5px solid #3498db;
            margin-bottom: 25px;
            line-height: 1.8;
            font-size: 16px;
            color: #555;
        }
        .instruction-list li {
            margin-bottom: 10px;
        }
        .instruction-list strong {
            color: #e74c3c;
        }
        /* 測驗區塊樣式 */
        .header-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .question-number {
            color: #7f8c8d;
            font-size: 14px;
            font-weight: bold;
        }
        .timer-container {
            font-size: 16px;
            font-weight: bold;
            color: #e74c3c;
            background-color: #fadbd8;
            padding: 5px 10px;
            border-radius: 5px;
        }
        .question-text {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
            line-height: 1.5;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .option-btn {
            background-color: #f8f9fa;
            border: 2px solid #dee2e6;
            border-radius: 5px;
            padding: 12px 15px;
            font-size: 16px;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
        }
        .option-btn:hover:not(:disabled) {
            background-color: #e2e6ea;
        }
        .option-btn:disabled {
            cursor: not-allowed;
            opacity: 0.8;
        }
        .correct {
            background-color: #d4edda !important;
            border-color: #c3e6cb !important;
            color: #155724;
        }
        .incorrect {
            background-color: #f8d7da !important;
            border-color: #f5c6cb !important;
            color: #721c24;
        }
        .feedback {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            background-color: #e9ecef;
            display: none;
            line-height: 1.5;
        }
        .timeout-text {
            color: #c0392b;
            font-weight: bold;
            margin-bottom: 5px;
            display: block;
        }
        .primary-btn {
            margin-top: 20px;
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 5px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s;
        }
        .primary-btn:hover {
            background-color: #2980b9;
        }
        #next-btn {
            display: none;
        }
        /* 結果頁面樣式 */
        .result-container {
            text-align: center;
            display: none;
        }
        .score {
            font-size: 28px;
            font-weight: bold;
            color: #27ae60;
            margin: 20px 0;
        }
    </style>
</head>
<body>

<div class="quiz-container" id="quiz-app">
    <div id="start-content">
        <h1>IP 子網路計算 (十題特訓版)</h1>
        <ul class="instruction-list">
            <li>本測驗共有 <strong>10</strong> 道單選題，每次皆由系統動態隨機生成。</li>
            <li>涵蓋題型：網路位址、廣播位址、可用主機數、遮罩轉換等。</li>
            <li>每題作答時間限制為 <strong>20 秒</strong>，請留意右上角的倒數計時。</li>
            <li>時間到若未作答，將自動視為錯誤並鎖定選項。</li>
        </ul>
        <button class="primary-btn" onclick="startQuiz()">準備好了，開始 10 題特訓！</button>
    </div>

    <div id="quiz-content" style="display: none;">
        <h1>子網路特訓中...</h1>
        <div class="header-info">
            <div class="question-number" id="q-number">問題 1 / 10</div>
            <div class="timer-container">剩餘時間：<span id="timer">20</span> 秒</div>
        </div>
        <div class="question-text" id="q-text">載入中...</div>
        <div class="options" id="options-container"></div>
        <div class="feedback" id="feedback-text"></div>
        <button class="primary-btn" id="next-btn" onclick="nextQuestion()">下一題</button>
        <button class="primary-btn" id="end-early-btn" style="background-color: #95a5a6; margin-top: 10px; display: none;" onclick="showResult()">提早結束並結算</button>
    </div>

    <div class="result-container" id="result-content">
        <h1>特訓結束！</h1>
        <div class="score" id="final-score">您的得分：0 / 10</div>
        <p id="score-message"></p>
        <button class="primary-btn" style="margin-top: 30px;" onclick="returnToHome()">回首頁</button>
        <button class="primary-btn" style="background-color: #2ecc71; margin-top: 10px;" onclick="restartQuiz()">再生成 10 題重新測驗</button>
    </div>
</div>

<script>
    // -----------------------------------------
    // IP 網路計算核心邏輯與動態出題系統
    // -----------------------------------------
    let quizData = []; 
    const TOTAL_QUESTIONS = 10;

    // 將 IP 字串轉為 32-bit 整數
    function ipToNum(ip) {
        return ip.split('.').reduce((acc, octet) => (acc << 8) + parseInt(octet, 10), 0) >>> 0;
    }

    // 將 32-bit 整數轉回 IP 字串
    function numToIp(num) {
        return (num >>> 24) + '.' + ((num >> 16) & 255) + '.' + ((num >> 8) & 255) + '.' + (num & 255);
    }

    // 將 CIDR 轉為子網路遮罩的 32-bit 整數
    function getMaskNum(cidr) {
        return (0xFFFFFFFF << (32 - cidr)) >>> 0;
    }

    // 隨機產生一個合法的 IP
    function getRandomIpString() {
        const o1 = Math.floor(Math.random() * 223) + 1; // 1-223 (排除群播等)
        if (o1 === 127) return getRandomIpString(); // 排除 loopback
        return `${o1}.${Math.floor(Math.random() * 256)}.${Math.floor(Math.random() * 256)}.${Math.floor(Math.random() * 256)}`;
    }

    // 題型 1：CIDR 轉十進位遮罩
    function qCidrToMask() {
        const cidr = Math.floor(Math.random() * 21) + 8; // /8 ~ /28
        const correct = numToIp(getMaskNum(cidr));
        let options = [{text: correct, isCorrect: true, rationale: `正確。/${cidr} 代表前面 ${cidr} 個位元為 1，二進位轉換十進位即為 ${correct}。`}];
        let fakes = new Set([cidr]);
        
        while(options.length < 4) {
            let fakeCidr = Math.floor(Math.random() * 21) + 8;
            if(!fakes.has(fakeCidr)) {
                fakes.add(fakeCidr);
                options.push({text: numToIp(getMaskNum(fakeCidr)), isCorrect: false, rationale: `錯誤。這是 /${fakeCidr} 的子網路遮罩。`});
            }
        }
        return { question: `將 CIDR 表示法 /${cidr} 轉換為十進位子網路遮罩 (Subnet Mask)，下列何者正確？`, options: options };
    }

    // 題型 2：計算可用主機數量
    function qUsableHosts() {
        const cidr = Math.floor(Math.random() * 14) + 16; // /16 ~ /29
        const correct = Math.pow(2, 32 - cidr) - 2;
        let options = [{text: correct.toString(), isCorrect: true, rationale: `正確。保留給主機的位元有 ${32-cidr} 個，2 的 ${32-cidr} 次方等於 ${Math.pow(2, 32-cidr)}，扣除網路與廣播位址後剩下 ${correct} 個。`}];
        let fakes = new Set([cidr]);
        
        // 陷阱題：忘記減2
        options.push({text: (correct + 2).toString(), isCorrect: false, rationale: `錯誤。你算出了總 IP 數，但忘記扣除全為 0 的網路位址和全為 1 的廣播位址 (需減 2)。`});
        fakes.add(0); // 隨便塞個避免重複

        while(options.length < 4) {
            let fakeCidr = Math.floor(Math.random() * 14) + 16;
            if(!fakes.has(fakeCidr)) {
                fakes.add(fakeCidr);
                let fakeAns = Math.pow(2, 32 - fakeCidr) - 2;
                options.push({text: fakeAns.toString(), isCorrect: false, rationale: `錯誤。計算不對。`});
            }
        }
        return { question: `當我們使用 /${cidr} 的子網路遮罩時，該網段最多可以提供多少個「可用」的主機 IP 位址？`, options: options };
    }

    // 題型 3：計算網路位址 (Network Address)
    function qNetworkAddress() {
        const cidr = Math.floor(Math.random() * 14) + 16;
        const ip = getRandomIpString();
        const ipNum = ipToNum(ip);
        const maskNum = getMaskNum(cidr);
        const netNum = (ipNum & maskNum) >>> 0;
        const bcastNum = (netNum | (~maskNum >>> 0)) >>> 0;
        
        let options = [{text: numToIp(netNum), isCorrect: true, rationale: `正確。將 IP 與遮罩做二進位 AND 運算，可得出網路位址為 ${numToIp(netNum)}。`}];
        let fakes = new Set([netNum]);

        // 陷阱：廣播位址
        fakes.add(bcastNum);
        options.push({text: numToIp(bcastNum), isCorrect: false, rationale: `錯誤。這是該網段的廣播位址，不是網路位址。`});

        while(options.length < 4) {
             let randOffset = (Math.floor(Math.random() * 3) + 1) * Math.pow(2, 32-cidr);
             let fakeNet = (netNum + randOffset) >>> 0;
             if(!fakes.has(fakeNet)) {
                 fakes.add(fakeNet);
                 options.push({text: numToIp(fakeNet), isCorrect: false, rationale: `錯誤。這不符合該 IP 的網段。`});
             }
        }
        return { question: `若主機 IP 位址為 ${ip}，標記為 /${cidr}，請問該主機所在的「網路位址 (Network Address)」是多少？`, options: options };
    }

    // 題型 4：計算廣播位址 (Broadcast Address)
    function qBroadcastAddress() {
        const cidr = Math.floor(Math.random() * 14) + 16;
        const ip = getRandomIpString();
        const ipNum = ipToNum(ip);
        const maskNum = getMaskNum(cidr);
        const netNum = (ipNum & maskNum) >>> 0;
        const bcastNum = (netNum | (~maskNum >>> 0)) >>> 0;
        
        let options = [{text: numToIp(bcastNum), isCorrect: true, rationale: `正確。該網段範圍從 ${numToIp(netNum)} 起，最後一個 IP 即為廣播位址 ${numToIp(bcastNum)}。`}];
        let fakes = new Set([bcastNum]);

        // 陷阱：網路位址
        fakes.add(netNum);
        options.push({text: numToIp(netNum), isCorrect: false, rationale: `錯誤。這是該網段的網路位址，不是廣播位址。`});

        while(options.length < 4) {
             let fakeBcast = (bcastNum - (Math.floor(Math.random() * 5) + 1)) >>> 0;
             if(!fakes.has(fakeBcast) && fakeBcast > netNum) {
                 fakes.add(fakeBcast);
                 options.push({text: numToIp(fakeBcast), isCorrect: false, rationale: `錯誤。這只是一般的可用 IP，不是廣播位址。`});
             }
        }
        return { question: `一個 IP 位址為 ${ip}，採用 CIDR 格式標記為 /${cidr}，請問該子網路的「廣播位址 (Broadcast Address)」是多少？`, options: options };
    }

    // 產生全部 10 題
    function generateAllQuestions() {
        let generated = [];
        const types = [qCidrToMask, qUsableHosts, qNetworkAddress, qBroadcastAddress];
        for(let i=0; i<TOTAL_QUESTIONS; i++) {
            // 平均分配題型並生成
            generated.push(types[i % types.length]());
        }
        // 將這 10 題的順序打亂
        shuffleArray(generated);
        return generated;
    }

    // 洗牌函數 (打亂陣列)
    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    // -----------------------------------------
    // 測驗流程控制介面
    // -----------------------------------------
    let currentQuestionIndex = 0;
    let score = 0;
    let timeLeft = 20;
    let timerInterval;

    const startContent = document.getElementById('start-content');
    const quizContent = document.getElementById('quiz-content');
    const resultContent = document.getElementById('result-content');
    
    const qNumberEl = document.getElementById('q-number');
    const qTextEl = document.getElementById('q-text');
    const optionsContainer = document.getElementById('options-container');
    const feedbackEl = document.getElementById('feedback-text');
    const nextBtn = document.getElementById('next-btn');
    const endEarlyBtn = document.getElementById('end-early-btn');
    const timerEl = document.getElementById('timer');
    const finalScoreEl = document.getElementById('final-score');
    const scoreMessageEl = document.getElementById('score-message');

    function startQuiz() {
        // 每次開始測驗時，重新生成 10 題！
        quizData = generateAllQuestions(); 

        startContent.style.display = 'none';
        quizContent.style.display = 'block';
        currentQuestionIndex = 0;
        score = 0;
        loadQuestion();
    }

    function returnToHome() {
        resultContent.style.display = 'none';
        startContent.style.display = 'block';
    }

    function restartQuiz() {
        resultContent.style.display = 'none';
        startQuiz(); // startQuiz 會重新生成新題目
    }

    function startTimer() {
        timeLeft = 20;
        timerEl.textContent = timeLeft;
        timerEl.parentElement.style.color = '#e74c3c';
        clearInterval(timerInterval);
        
        timerInterval = setInterval(() => {
            timeLeft--;
            timerEl.textContent = timeLeft;
            if (timeLeft <= 5) timerEl.parentElement.style.color = '#c0392b';

            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                handleTimeOut();
            }
        }, 1000);
    }

    function handleTimeOut() {
        const currentData = quizData[currentQuestionIndex];
        const buttons = optionsContainer.getElementsByClassName('option-btn');
        Array.from(buttons).forEach(btn => btn.disabled = true);

        const correctIndex = currentData.options.findIndex(opt => opt.isCorrect);
        buttons[correctIndex].classList.add('correct');

        feedbackEl.innerHTML = `<span class="timeout-text">⏳ 時間到！未作答。</span>${currentData.options[correctIndex].rationale}`;
        feedbackEl.style.display = 'block';

        showNextButtons();
    }

    function loadQuestion() {
        feedbackEl.style.display = 'none';
        nextBtn.style.display = 'none';
        endEarlyBtn.style.display = 'none';
        optionsContainer.innerHTML = '';

        const currentData = quizData[currentQuestionIndex];
        qNumberEl.textContent = `問題 ${currentQuestionIndex + 1} / ${TOTAL_QUESTIONS}`;
        qTextEl.textContent = currentData.question;

        // 打亂本題的 4 個選項順序
        shuffleArray(currentData.options);

        currentData.options.forEach((option, index) => {
            const button = document.createElement('button');
            button.className = 'option-btn';
            button.textContent = option.text;
            button.onclick = () => selectOption(index, button);
            optionsContainer.appendChild(button);
        });

        startTimer();
    }

    function selectOption(selectedIndex, selectedButton) {
        clearInterval(timerInterval);

        const currentData = quizData[currentQuestionIndex];
        const buttons = optionsContainer.getElementsByClassName('option-btn');
        Array.from(buttons).forEach(btn => btn.disabled = true);

        const isCorrect = currentData.options[selectedIndex].isCorrect;

        if (isCorrect) {
            selectedButton.classList.add('correct');
            score++;
        } else {
            selectedButton.classList.add('incorrect');
            const correctIndex = currentData.options.findIndex(opt => opt.isCorrect);
            buttons[correctIndex].classList.add('correct');
        }

        feedbackEl.innerHTML = currentData.options[selectedIndex].rationale;
        feedbackEl.style.display = 'block';

        showNextButtons();
    }

    function showNextButtons() {
        nextBtn.style.display = 'block';
        // 因為 10 題很長，提供一個提早結算的按鈕
        endEarlyBtn.style.display = 'block'; 

        if (currentQuestionIndex === TOTAL_QUESTIONS - 1) {
            nextBtn.textContent = '查看最終特訓結果';
            endEarlyBtn.style.display = 'none';
        } else {
            nextBtn.textContent = '下一題';
        }
    }

    function nextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex < TOTAL_QUESTIONS) {
            loadQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        clearInterval(timerInterval);
        quizContent.style.display = 'none';
        resultContent.style.display = 'block';
        
        // 顯示結果與提早結束的處理
        let totalAttempted = currentQuestionIndex; 
        if(currentQuestionIndex === TOTAL_QUESTIONS - 1 && nextBtn.style.display === 'none') {
            // 代表是自然完成10題
            totalAttempted = TOTAL_QUESTIONS;
        } else if (currentQuestionIndex < TOTAL_QUESTIONS && document.querySelector('.option-btn').disabled) {
            // 如果提早按，但當下這題已經作答/超時了，算入總數
            totalAttempted = currentQuestionIndex + 1;
        } else if (currentQuestionIndex === TOTAL_QUESTIONS) {
            totalAttempted = TOTAL_QUESTIONS;
        }

        finalScoreEl.textContent = `您的得分：${score} / ${totalAttempted} 題`;
        
        let percentage = totalAttempted === 0 ? 0 : Math.round((score / totalAttempted) * 10);

        if(percentage >= 90) {
            scoreMessageEl.textContent = "太神啦！你簡直是行走的子網路計算機！💯";
        } else if (percentage >= 60) {
            scoreMessageEl.textContent = "表現不錯喔！基本觀念都有了，繼續保持！👍";
        } else {
            scoreMessageEl.textContent = "沒關係，子網路計算本來就很燒腦。多練幾次一定會開竅！💪";
        }
    }
</script>

</body>
</html>
