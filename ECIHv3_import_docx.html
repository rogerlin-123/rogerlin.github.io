<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECIH v3 模擬題庫 (自動存檔進化版)</title>
    <!-- 引入 JSZip 來解析 DOCX 壓縮檔 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --success: #2ecc71;
            --danger: #e74c3c;
            --warning: #f1c40f;
            --info: #8e44ad;
            --light: #f4f7f6;
            --border: #e0e6ed;
            --text-dark: #333;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light);
            color: var(--text-dark);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 850px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            transition: all 0.3s;
        }

        header {
            border-bottom: 2px solid var(--border);
            margin-bottom: 20px;
            padding-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        h2 { margin: 0; color: var(--primary); font-size: 1.6em; }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn-action {
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85em;
            transition: 0.2s;
        }
        .btn-restart { background: var(--secondary); }
        .btn-restart:hover { background: #2980b9; }
        .btn-clear { background: var(--danger); }
        .btn-clear:hover { background: #c0392b; }
        .btn-review { background: var(--info); }
        .btn-review:hover { background: #732d91; }

        .stats-board { display: flex; gap: 10px; }

        .stat-box {
            background: var(--light);
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            text-align: center;
            font-weight: bold;
            font-size: 0.9em;
        }

        .stat-box span {
            display: block;
            font-size: 1.3em;
            color: var(--primary);
            margin-top: 3px;
        }

        /* Loading Screen */
        #loading-screen { text-align: center; padding: 60px 20px; }
        
        .loader-spinner {
            border: 6px solid #f3f3f3;
            border-top: 6px solid var(--secondary);
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Fallback Upload Button */
        .fallback-upload {
            display: inline-block; padding: 10px 20px; background: var(--primary);
            color: white; border-radius: 6px; cursor: pointer; font-weight: bold;
            margin-top: 15px; transition: 0.2s; border: none;
        }
        .fallback-upload:hover { background: #1a252f; }

        /* Quiz Screen */
        .navigator {
            display: flex;
            align-items: center;
            background: #ebf5fb;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            gap: 10px;
            border: 1px solid #bce0fd;
            flex-wrap: wrap;
        }

        .navigator label { font-weight: bold; color: var(--primary); }
        .navigator input {
            width: 80px; padding: 8px; border: 1px solid #ccc;
            border-radius: 6px; font-size: 1em; text-align: center;
        }
        .navigator button {
            padding: 8px 20px; background: var(--secondary); color: white;
            border: none; border-radius: 6px; cursor: pointer; font-weight: bold;
        }
        .navigator button:hover { background: #2980b9; }

        .question-card { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .source-tag {
            font-size: 0.85em; background: #e1e8ed; padding: 5px 10px;
            border-radius: 20px; margin-bottom: 15px; display: inline-block;
            color: #555; font-weight: 600; vertical-align: middle;
        }
        
        .alert-tag {
            font-size: 0.85em; background: #fff3cd; padding: 5px 10px;
            border-radius: 20px; margin-bottom: 15px; display: inline-block;
            color: #856404; font-weight: 600; margin-left: 10px; vertical-align: middle;
        }

        /* Translate Button */
        .btn-translate {
            background: var(--warning); color: #fff; border: none; padding: 5px 12px;
            border-radius: 20px; cursor: pointer; font-size: 0.85em; font-weight: bold;
            margin-left: 10px; margin-bottom: 15px; display: inline-block;
            vertical-align: middle; transition: 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .btn-translate:hover:not(:disabled) { background: #d68910; }
        .btn-translate:disabled { opacity: 0.6; cursor: not-allowed; }

        .translation-box {
            margin-top: 15px; padding: 15px; background: #fef9e7; border-left: 5px solid var(--warning);
            border-radius: 6px; color: #444; font-size: 0.95em; line-height: 1.6;
        }

        .question-text {
            font-size: 1.2em; font-weight: 600; margin-bottom: 25px;
            line-height: 1.6; color: var(--primary);
        }

        .options-list { list-style: none; padding: 0; margin: 0; }
        .option-item {
            background: #fdfdfd; border: 2px solid var(--border); padding: 16px;
            margin-bottom: 12px; border-radius: 8px; cursor: pointer;
            transition: all 0.2s; font-size: 1.05em; line-height: 1.4;
            display: flex; align-items: flex-start; gap: 10px;
        }
        .option-item:hover:not(.disabled) {
            border-color: var(--secondary); background: #f0f8ff; transform: translateX(5px);
        }
        .option-item.disabled { cursor: default; }
        .option-item.correct {
            border-color: var(--success) !important; background: #eafaf1 !important; font-weight: bold;
        }
        .option-item.wrong {
            border-color: var(--danger) !important; background: #fdedec !important;
        }
        .option-badge {
            background: #e0e6ed; color: #555; padding: 2px 8px; 
            border-radius: 4px; font-size: 0.9em; font-weight: bold;
        }
        .option-item.correct .option-badge { background: var(--success); color: white; }
        .option-item.wrong .option-badge { background: var(--danger); color: white; }

        .feedback {
            margin-top: 20px; padding: 15px; border-radius: 8px;
            font-size: 1.1em; font-weight: bold; display: none;
        }

        .controls {
            margin-top: 35px; display: flex; justify-content: space-between;
            border-top: 2px solid var(--border); padding-top: 20px;
        }
        .controls button {
            padding: 12px 25px; border: none; border-radius: 6px; cursor: pointer;
            font-weight: bold; font-size: 1.05em; transition: 0.2s;
        }
        .btn-prev { background: #95a5a6; color: white; }
        .btn-prev:hover:not(:disabled) { background: #7f8c8d; }
        .btn-next { background: var(--primary); color: white; }
        .btn-next:hover:not(:disabled) { background: #1a252f; }
        button:disabled { opacity: 0.4; cursor: not-allowed; }

        .keyboard-hints {
            text-align: center; margin-top: 15px; font-size: 0.85em; color: #7f8c8d;
        }
        .key-btn {
            background: #ecf0f1; border: 1px solid #bdc3c7; border-radius: 4px;
            padding: 2px 6px; font-family: monospace; font-weight: bold; color: #2c3e50;
        }

        /* Review Modal Styles */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6); z-index: 2000;
            display: none; justify-content: center; align-items: center;
            backdrop-filter: blur(3px);
        }
        .modal-content {
            background: white; padding: 25px; border-radius: 12px;
            width: 90%; max-width: 800px; max-height: 85vh;
            display: flex; flex-direction: column;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .modal-header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid var(--border); padding-bottom: 15px; margin-bottom: 20px;
        }
        .modal-header h3 { margin: 0; color: var(--primary); font-size: 1.4em; }
        .btn-close {
            background: none; border: none; font-size: 1.5em; cursor: pointer; color: #999;
            padding: 0; line-height: 1; transition: 0.2s;
        }
        .btn-close:hover { color: var(--danger); transform: scale(1.1); }
        .review-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); gap: 10px;
            overflow-y: auto; padding-right: 10px;
        }
        .review-item {
            padding: 10px; text-align: center; border-radius: 6px; cursor: pointer; 
            font-weight: bold; border: 1px solid #ccc; background: #f9f9f9; color: #999;
            transition: 0.2s; display: flex; flex-direction: column; justify-content: center;
        }
        .review-item:hover { filter: brightness(0.95); transform: translateY(-2px); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .review-item.correct { background: var(--success); color: white; border-color: var(--success); }
        .review-item.wrong { background: var(--danger); color: white; border-color: var(--danger); }
        .review-item.current { box-shadow: 0 0 0 3px var(--secondary); border-color: var(--secondary); }
    </style>
</head>
<body>

<!-- 初始畫面：自動載入畫面 -->
<div class="container" id="loading-screen">
    <div class="loader-spinner" id="spinner"></div>
    <h2 style="color: var(--primary);" id="loading-title">⚙️ 題庫自動載入中...</h2>
    <p style="color: #7f8c8d; margin-top: 15px; font-size: 1.1em;" id="loading-subtitle">
        正在讀取並解析同目錄下的 <b>ECIHv3.docx</b><br>請稍候片刻...
    </p>
    <div id="error-msg" style="color: var(--danger); margin-top: 20px; font-weight: bold;"></div>
</div>

<!-- 測驗畫面：解析完成後顯示 -->
<div class="container" id="quiz-screen" style="display: none;">
    <header>
        <div>
            <h2>ECIH v3 模擬考練習</h2>
            <p style="margin: 5px 0 0 0; color: #7f8c8d; font-size: 0.9em;">自動存檔功能已啟用 💾</p>
        </div>
        <div class="header-actions">
            <button class="btn-action btn-review" onclick="openReview()">📊 檢視紀錄</button>
            <button class="btn-action btn-clear" onclick="clearProgress()">🗑️ 清空進度</button>
            <div class="stats-board">
                <div class="stat-box">作答進度<span id="progress-text">0 / 0</span></div>
                <div class="stat-box">答對題數<span id="score-text" style="color: var(--success);">0</span></div>
                <div class="stat-box">正確率<span id="accuracy-text" style="color: var(--warning);">0%</span></div>
            </div>
        </div>
    </header>

    <div class="navigator">
        <label for="jump-input">前往題號：</label>
        <input type="number" id="jump-input" min="1" value="1" onkeydown="if(event.key === 'Enter') jumpQuestion()">
        <span style="font-weight: bold; color: #555;">/ 共 <span id="total-q"></span> 題</span>
        <button onclick="jumpQuestion()">立即跳轉</button>
    </div>

    <div id="quiz-container">
        <!-- 題目將由 JavaScript 動態生成 -->
    </div>

    <div class="controls">
        <button class="btn-prev" id="prev-btn" onclick="prevQuestion()">◄ 上一題</button>
        <button class="btn-next" id="next-btn" onclick="nextQuestion()">下一題 ►</button>
    </div>
    <div class="keyboard-hints">
        💡 快捷鍵：按 <span class="key-btn">←</span> <span class="key-btn">→</span> 切換，按 <span class="key-btn">1</span> <span class="key-btn">2</span> <span class="key-btn">3</span> <span class="key-btn">4</span> 快速作答
    </div>
</div>

<!-- 檢視紀錄的 Modal 視窗 -->
<div class="modal-overlay" id="review-modal" onclick="if(event.target===this) closeReview()">
    <div class="modal-content">
        <div class="modal-header">
            <h3>📊 作答紀錄總覽</h3>
            <button class="btn-close" onclick="closeReview()">&times;</button>
        </div>
        <div class="review-grid" id="review-grid">
            <!-- 格子將由 JavaScript 動態生成 -->
        </div>
    </div>
</div>

<script>
    let rawData = [];
    let currentIdx = 0; 
    let userState = [];

    // LocalStorage Key
    const STORAGE_KEY = 'ecih_v3_saved_progress';

    // --- 自動載入同目錄下的 DOCX 檔案 ---
    window.onload = function() {
        const targetFilename = './ECIHv3.docx';
        
        try {
            fetch(targetFilename)
                .then(response => {
                    if (!response.ok) throw new Error(`HTTP 錯誤狀態: ${response.status}`);
                    return response.arrayBuffer();
                })
                .then(arrayBuffer => JSZip.loadAsync(arrayBuffer))
                .then(zip => zip.file("word/document.xml").async("string"))
                .then(xmlString => parseWordXML(xmlString))
                .catch(error => {
                    console.error("載入或解析檔案時發生錯誤:", error);
                    showFallbackUpload(targetFilename, error.message);
                });
        } catch (error) {
            console.error("Fetch API 執行失敗 (可能處於沙盒預覽環境):", error);
            showFallbackUpload(targetFilename, error.message);
        }
    };

    // 顯示備用上傳機制
    function showFallbackUpload(filename, errMsg) {
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('loading-title').innerText = "⚠️ 自動載入失敗";
        document.getElementById('loading-subtitle').style.display = 'none';
        
        document.getElementById('error-msg').innerHTML = 
            `無法在伺服器找到 <b>${filename}</b>。<br>
             <span style="font-size: 0.85em; color: #555;">(錯誤詳情: ${errMsg})</span><br><br>
             您可以手動選取檔案繼續：<br>
             <label for="fallback-file" class="fallback-upload">📁 手動選擇 .docx 檔案</label>
             <input type="file" id="fallback-file" accept=".docx" style="display:none;" onchange="handleFallbackFile(this)">`;
    }

    function handleFallbackFile(input) {
        if (input.files.length === 0) return;
        const file = input.files[0];
        document.getElementById('error-msg').innerHTML = "<span style='color:#3498db'>讀取中，請稍候...</span>";
        
        const reader = new FileReader();
        reader.onload = function(e) {
            JSZip.loadAsync(e.target.result)
                .then(zip => zip.file("word/document.xml").async("string"))
                .then(xmlString => parseWordXML(xmlString))
                .catch(err => alert("手動解析失敗: " + err));
        };
        reader.readAsArrayBuffer(file);
    }

    function escapeHtml(str) {
        return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function mapWordColor(val) {
        if (val.startsWith("#")) return val;
        const map = {
            "yellow": "yellow", "green": "green", "cyan": "cyan", "magenta": "magenta", 
            "blue": "blue", "red": "red", "darkBlue": "darkblue", "darkCyan": "darkcyan", 
            "darkGreen": "darkgreen", "darkMagenta": "darkmagenta", "darkRed": "darkred", 
            "darkYellow": "#cccc00", "darkGray": "darkgray", "lightGray": "lightgray", "black": "black"
        };
        return map[val] || val;
    }

    // --- 核心：解析 Word XML ---
    function parseWordXML(xmlString) {
        const parser = new DOMParser();
        const xmlDoc = parser.parseFromString(xmlString, "text/xml");
        const paragraphs = xmlDoc.getElementsByTagName("w:p");
        let parsedLines = [];
        
        for (let i = 0; i < paragraphs.length; i++) {
            let p = paragraphs[i];
            let textPieces = [];
            let pHighlighted = false;
            let pBgColor = "";
            
            let pPrList = p.getElementsByTagName("w:pPr");
            if (pPrList.length > 0) {
                let shdList = pPrList[0].getElementsByTagName("w:shd");
                if (shdList.length > 0) {
                    let fill = shdList[0].getAttribute("w:fill");
                    if (fill && fill !== "auto" && fill !== "none" && fill !== "FFFFFF" && fill !== "000000") {
                        pHighlighted = true; pBgColor = "#" + fill;
                    }
                }
            }
            
            let runs = p.getElementsByTagName("w:r");
            for (let j = 0; j < runs.length; j++) {
                let r = runs[j];
                let rHighlighted = false;
                let rFontColor = "";
                let rBgColor = "";
                
                let rPrList = r.getElementsByTagName("w:rPr");
                if (rPrList.length > 0) {
                    let colorNode = rPrList[0].getElementsByTagName("w:color");
                    if (colorNode.length > 0) {
                        let val = colorNode[0].getAttribute("w:val");
                        if (val && val !== "auto") rFontColor = "#" + val;
                    }

                    let highlightList = rPrList[0].getElementsByTagName("w:highlight");
                    if (highlightList.length > 0) {
                        let val = highlightList[0].getAttribute("w:val");
                        if (val && val !== "none") { rHighlighted = true; rBgColor = val; }
                    }

                    let shdList = rPrList[0].getElementsByTagName("w:shd");
                    if (shdList.length > 0) {
                        let fill = shdList[0].getAttribute("w:fill");
                        if (fill && fill !== "auto" && fill !== "none" && fill !== "FFFFFF" && fill !== "000000") {
                            rHighlighted = true; rBgColor = "#" + fill;
                        }
                    }
                }
                
                for (let child of r.childNodes) {
                    if (child.localName === "t") {
                        textPieces.push({ 
                            text: child.textContent, 
                            isHighlighted: pHighlighted || rHighlighted,
                            color: rFontColor, bgColor: rBgColor || pBgColor
                        });
                    } else if (child.localName === "br") {
                        textPieces.push({ text: "\n", isHighlighted: false });
                    }
                }
            }
            
            let currentLinePlain = "";
            let currentLineHtml = "";
            let currentLineHighlight = false;

            for (let tp of textPieces) {
                if (tp.text === "\n") {
                    if (currentLinePlain.trim().length > 0) {
                        parsedLines.push({ plainText: currentLinePlain.trim(), htmlText: currentLineHtml.trim(), isHighlighted: currentLineHighlight });
                    }
                    currentLinePlain = ""; currentLineHtml = ""; currentLineHighlight = false;
                } else {
                    currentLinePlain += tp.text;
                    let styleStr = "";
                    if (tp.color) styleStr += `color: ${tp.color}; `;
                    if (tp.bgColor) {
                        let cssBg = mapWordColor(tp.bgColor);
                        styleStr += `background-color: ${cssBg}; `;
                    }
                    
                    if (styleStr) currentLineHtml += `<span style="${styleStr}">${escapeHtml(tp.text)}</span>`;
                    else currentLineHtml += escapeHtml(tp.text);

                    if (tp.isHighlighted && tp.text.trim().length > 0) currentLineHighlight = true;
                }
            }
            if (currentLinePlain.trim().length > 0) {
                parsedLines.push({ plainText: currentLinePlain.trim(), htmlText: currentLineHtml.trim(), isHighlighted: currentLineHighlight });
            }
        }
        processParsedLines(parsedLines);
    }

    function processParsedLines(parsedLines) {
        let questions = [];
        let currentQ = null;
        let blockName = "題庫";

        parsedLines.forEach(lineObj => {
            let text = lineObj.plainText;
            let htmlText = lineObj.htmlText;
            let isHighlighted = lineObj.isHighlighted;

            if (text.match(/Exam.*Part/i) || text.includes("Question 100") || text.includes("Question 205")) {
                blockName = text.substring(0, 30);
                return;
            }

            if (text.match(/^QUESTION \d+/i) || text.match(/^\d+\.?\s*$/)) {
                if (currentQ && currentQ.q) questions.push(currentQ);
                currentQ = { 
                    q: "", plainQ: "", options: [], ans: 0, hasHighlight: false, 
                    src: blockName + " - " + text.replace('.', '').trim(), translatedData: null, translationVisible: false 
                };
                return;
            }

            if (!currentQ) return;

            let optMatch = text.match(/^([A-F])[\.\)]\s*(.+)/i);
            if (optMatch) {
                currentQ.options.push(optMatch[2].trim());
                if (isHighlighted) { currentQ.ans = currentQ.options.length - 1; currentQ.hasHighlight = true; }
            } else {
                if (currentQ.options.length === 0) {
                    currentQ.q += (currentQ.q ? "<br>" : "") + htmlText;
                    currentQ.plainQ += (currentQ.plainQ ? "\n" : "") + text;
                } else {
                    currentQ.options[currentQ.options.length - 1] += " " + text;
                    if (isHighlighted) { currentQ.ans = currentQ.options.length - 1; currentQ.hasHighlight = true; }
                }
            }
        });

        if (currentQ && currentQ.q) questions.push(currentQ);

        if (questions.length < 1) {
            alert("⚠️ 解析異常：未能在檔案中找到有效的題目標記結構。");
            return;
        }

        rawData = questions;
        userState = new Array(rawData.length).fill(null);
        
        loadProgress(); // 嘗試載入本地存檔

        document.getElementById('loading-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        initQuiz();
    }

    // --- 存檔與讀檔邏輯 ---
    function saveProgress() {
        const simplifiedState = userState.map(s => s ? { answered: s.answered, selectedIdx: s.selectedIdx, isCorrect: s.isCorrect } : null);
        const data = {
            currentIdx: currentIdx,
            state: simplifiedState
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function loadProgress() {
        const savedData = localStorage.getItem(STORAGE_KEY);
        if (savedData) {
            try {
                const data = JSON.parse(savedData);
                if (data.state && data.state.length === rawData.length) {
                    userState = data.state;
                    currentIdx = data.currentIdx || 0;
                    console.log("已成功載入上次進度！");
                }
            } catch (e) { console.error("解析存檔失敗", e); }
        }
    }

    function clearProgress() {
        if(confirm("確定要清空所有作答進度與紀錄嗎？(此動作無法復原)")) {
            localStorage.removeItem(STORAGE_KEY);
            userState = new Array(rawData.length).fill(null);
            currentIdx = 0;
            renderQuestion();
            const toast = document.createElement('div');
            toast.innerHTML = `🗑️ 進度已清空，重新開始！`;
            toast.style.cssText = `position: fixed; bottom: 20px; right: 20px; background: var(--primary); color: white; padding: 15px 20px; border-radius: 8px; font-weight: bold; z-index: 1000; animation: fadeIn 0.3s;`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
    }

    function initQuiz() {
        const total = rawData.length;
        document.getElementById('total-q').textContent = total;
        document.getElementById('jump-input').max = total;
        renderQuestion();
    }

    // --- 檢視總覽 Modal 功能 ---
    function openReview() {
        const grid = document.getElementById('review-grid');
        let html = '';
        
        for (let i = 0; i < rawData.length; i++) {
            const state = userState[i];
            let statusClass = 'unanswered';
            let icon = '⬜';
            
            if (state && state.answered) {
                if (state.isCorrect) {
                    statusClass = 'correct';
                    icon = '✅';
                } else {
                    statusClass = 'wrong';
                    icon = '❌';
                }
            }
            
            // 標示目前所在的題目
            if (i === currentIdx) {
                statusClass += ' current';
            }

            html += `
                <div class="review-item ${statusClass}" onclick="goToQuestion(${i})">
                    <div style="font-size:0.85em; margin-bottom: 5px;">Q${i+1}</div>
                    <div style="font-size:1.1em;">${icon}</div>
                </div>
            `;
        }
        
        grid.innerHTML = html;
        document.getElementById('review-modal').style.display = 'flex';
    }

    function closeReview() {
        document.getElementById('review-modal').style.display = 'none';
    }

    function goToQuestion(idx) {
        currentIdx = idx;
        renderQuestion();
        closeReview();
    }

    // --- Google 翻譯邏輯 (加入 Toggle) ---
    async function translateQuestion() {
        const currentQ = rawData[currentIdx];
        const translateBtn = document.getElementById('translate-btn');
        const translatedDiv = document.getElementById('translated-text');

        if (currentQ.translatedData) {
            currentQ.translationVisible = !currentQ.translationVisible;
            if (currentQ.translationVisible) {
                translatedDiv.style.display = 'block';
                translateBtn.innerHTML = "🙈 隱藏翻譯";
            } else {
                translatedDiv.style.display = 'none';
                translateBtn.innerHTML = "🇹🇼 顯示翻譯";
            }
            return;
        }

        try {
            translateBtn.innerHTML = "⏳ 翻譯中...";
            translateBtn.disabled = true;

            let textToTranslate = currentQ.plainQ + "\n\n";
            currentQ.options.forEach((opt, i) => { textToTranslate += `${String.fromCharCode(65 + i)}. ${opt}\n`; });

            const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=zh-TW&dt=t&q=${encodeURIComponent(textToTranslate)}`;
            const response = await fetch(url);
            const data = await response.json();
            
            let translatedText = "";
            data[0].forEach(part => { translatedText += part[0]; });

            currentQ.translatedData = translatedText.replace(/\n/g, '<br>');
            currentQ.translationVisible = true;
            
            translatedDiv.innerHTML = `<b>📝 中文翻譯：</b><br><br>${currentQ.translatedData}`;
            translatedDiv.style.display = 'block';
            translateBtn.innerHTML = "🙈 隱藏翻譯";
            
        } catch (error) {
            console.error("翻譯失敗:", error);
            alert("翻譯請求失敗，請檢查網路連線或稍後再試！");
            translateBtn.innerHTML = "🇹🇼 翻譯";
        } finally {
            translateBtn.disabled = false;
        }
    }

    function renderQuestion() {
        const container = document.getElementById('quiz-container');
        const currentQ = rawData[currentIdx];
        const state = userState[currentIdx];

        document.getElementById('jump-input').value = currentIdx + 1;
        document.getElementById('prev-btn').disabled = (currentIdx === 0);
        document.getElementById('next-btn').disabled = (currentIdx === rawData.length - 1);

        container.style.animation = 'none';
        container.offsetHeight; 
        container.style.animation = 'fadeIn 0.3s ease-out';

        let optionsHtml = '';
        currentQ.options.forEach((opt, i) => {
            let itemClass = 'option-item';
            if (state && state.answered) {
                itemClass += ' disabled';
                if (i === currentQ.ans) itemClass += ' correct';
                else if (i === state.selectedIdx && !state.isCorrect) itemClass += ' wrong';
            }
            optionsHtml += `<li class="${itemClass}" onclick="checkAnswer(${i})"><span class="option-badge">${String.fromCharCode(65 + i)}</span><span>${opt}</span></li>`;
        });

        let feedbackHtml = '';
        if (state && state.answered) {
            if (state.isCorrect) feedbackHtml = `<div class="feedback" style="display:block; background:#eafaf1; color:var(--success);">✅ 答對了！</div>`;
            else feedbackHtml = `<div class="feedback" style="display:block; background:#fdedec; color:var(--danger);">❌ 答錯了。正確答案為: ${String.fromCharCode(65 + currentQ.ans)}</div>`;
        }

        let alertTag = currentQ.hasHighlight ? "" : `<div class="alert-tag">⚠️ 此題未偵測到選項螢光筆，預設答案為 A</div>`;
        
        let transBtnText = "🇹🇼 翻譯";
        let transDisplayStyle = "none";
        if (currentQ.translatedData) {
            transBtnText = currentQ.translationVisible ? "🙈 隱藏翻譯" : "🇹🇼 顯示翻譯";
            transDisplayStyle = currentQ.translationVisible ? "block" : "none";
        }

        let translationHtml = `<div id="translated-text" class="translation-box" style="display:${transDisplayStyle};"><b>📝 中文翻譯：</b><br><br>${currentQ.translatedData || ''}</div>`;

        let html = `
            <div class="question-card">
                <div class="source-tag">📂 來源：${currentQ.src}</div>
                <button id="translate-btn" class="btn-translate" onclick="translateQuestion()">${transBtnText}</button>
                ${alertTag}
                
                <div class="question-text">
                    <span style="color:var(--secondary);">第 ${currentIdx + 1} 題：</span><br><br>
                    ${currentQ.q}
                    ${translationHtml}
                </div>
                <ul class="options-list">
                    ${optionsHtml}
                </ul>
                ${feedbackHtml}
            </div>
        `;
        
        container.innerHTML = html;
        updateStats();
        saveProgress(); // 切換題目時自動存檔
    }

    function checkAnswer(selectedIdx) {
        if (userState[currentIdx] && userState[currentIdx].answered) return;

        const currentQ = rawData[currentIdx];
        const isCorrect = (selectedIdx === currentQ.ans);

        userState[currentIdx] = { answered: true, selectedIdx: selectedIdx, isCorrect: isCorrect };
        renderQuestion(); // render 裡面包含 saveProgress()
    }

    function jumpQuestion() {
        const inputVal = parseInt(document.getElementById('jump-input').value);
        if (isNaN(inputVal) || inputVal < 1 || inputVal > rawData.length) {
            alert(`⚠️ 請輸入 1 到 ${rawData.length} 之間的有效題號。`);
            return;
        }
        currentIdx = inputVal - 1;
        renderQuestion();
    }

    function prevQuestion() {
        if (currentIdx > 0) { currentIdx--; renderQuestion(); }
    }

    function nextQuestion() {
        if (currentIdx < rawData.length - 1) { currentIdx++; renderQuestion(); }
    }

    function updateStats() {
        let answeredCount = 0, correctCount = 0;
        userState.forEach(state => {
            if (state && state.answered) {
                answeredCount++;
                if (state.isCorrect) correctCount++;
            }
        });
        document.getElementById('progress-text').textContent = `${answeredCount} / ${rawData.length}`;
        document.getElementById('score-text').textContent = correctCount;
        
        // 計算正確率
        const accuracy = answeredCount === 0 ? 0 : Math.round((correctCount / answeredCount) * 100);
        const accuracyEl = document.getElementById('accuracy-text');
        accuracyEl.textContent = `${accuracy}%`;
        
        // 依據正確率變更顏色 (低於70%為紅色)
        if (answeredCount > 0) {
            if (accuracy < 70) {
                accuracyEl.style.color = 'var(--danger)'; // 紅色
            } else {
                accuracyEl.style.color = 'var(--success)'; // 綠色
            }
        } else {
            accuracyEl.style.color = 'var(--warning)'; // 預設黃色
        }
    }

    // --- 鍵盤控制支援 ---
    document.addEventListener('keydown', (e) => {
        // 如果開啟了 Review Modal，不要觸發捷徑作答，但可以按 ESC 關閉
        if (document.getElementById('review-modal').style.display === 'flex') {
            if (e.key === 'Escape') closeReview();
            return;
        }

        if (document.getElementById('quiz-screen').style.display === 'block' && e.target.tagName !== 'INPUT') {
            if (e.key === 'ArrowLeft') prevQuestion();
            else if (e.key === 'ArrowRight') nextQuestion();
            else if (['1', '2', '3', '4', '5', '6'].includes(e.key)) {
                const optIndex = parseInt(e.key) - 1;
                if (rawData[currentIdx] && rawData[currentIdx].options.length > optIndex) checkAnswer(optIndex);
            }
        }
    });
</script>
